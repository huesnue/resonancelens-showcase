# ResonanceLens Showcase — lokaler Kafka-Broker fuer den live-Modus
# ==================================================================
# Nur fuer RL_STREAM_MODE=live noetig. Der sim-Modus (Default) braucht
# das hier NICHT — die App laeuft dann ohne Broker (auch auf Streamlit Cloud).
#
# Start (WSL2 / Docker):
#     docker compose up -d
#     export RL_STREAM_MODE=live
#     streamlit run app_live_demo.py
#     # in einem zweiten Terminal:
#     python -m streaming.producers.satellite_producer
#
# Host-App  -> localhost:9092   (PLAINTEXT-Listener)
# kafka-ui  -> kafka:29092      (INTERNAL-Listener, im Docker-Netz)
# kafka-ui Web-UI: http://localhost:8080
# Single-Node KRaft (kein ZooKeeper). Auto-Topic-Creation aktiv.

services:
  kafka:
    image: apache/kafka:3.8.0
    container_name: rl-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: rl-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: resonancelens
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: "true"
